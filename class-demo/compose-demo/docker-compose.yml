services:
  db:
    image: mysql:8.0
    container_name: class-demo-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: training
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./app
    container_name: class-demo-web
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: training
      DB_PORT: "3306"
    ports:
      - "8080:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
